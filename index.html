<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <title>自己紹介ページ</title>
        <link rel="stylesheet" type="text/css" href="css/style.css">
    </head>
    <body>
        <header>
            <div class="header">自己紹介ページ</div>
        </header>
        <main>
            <p>※ レスポンシブ対応してません。PC画面での閲覧を推奨します。</p>
            <h1 class="title">資料の公開</h1>
            <div class="flex-box">
                <div class="flex-item">
                    <h3 class="card_ttl">発表資料</h3>
                    <p class="card_ttl">presentation materials</p>
                    <a target="_blank" href="https://docs.google.com/presentation/d/1nURQ3yH9okIhoB_D1fTx_nAxKWfRikrjV5MJXAVN-j0/edit?usp=sharing">
                        <img class="card_img_vertical" src="img/presentation.png" alt="発表資料">
                    </a>
                </div>
                <div class="flex-item">
                    <h3 class="card_ttl">補足資料</h3>
                    <p class="card_ttl">supplementary material</p>
                    <a target="_blank" href="https://docs.google.com/presentation/d/1Uy7Un55N9C27wxR1GHDFMlokQMEyHB39J_NBr9IyOuI/edit?usp=sharing">
                        <img class="card_img_vertical" src="img/supplementary.png" alt="補足資料">
                    </a>
                </div>
            </div>

            <h1 class="title">基本情報</h1>
            <div class="flex-box">
                <div class="flex-item">
                    <h3 class="card_ttl">名前</h3>
                    <p class="card_ttl">name</p>
                    <img class="card_img" src="img/otter.png" alt="名前">
                    <p class="card_text">加藤龍之介</p>
                </div>
                <div class="flex-item">
                    <h3 class="card_ttl">出身地</h3>
                    <p class="card_ttl">birthplace</p>
                    <img class="card_img" src="img/tottori.png" alt="出身地">
                    <p class="card_text">鳥取県</p>
                </div>
                <div class="flex-item">
                    <h3 class="card_ttl">出身校</h3>
                    <p class="card_ttl">alma mater</p>
                    <img class="card_img" src="img/it.png" alt="出身校">
                    <p class="card_text">神戸電子専門学校</p>
                </div>
            </div>

            <h1 class="title">勤務経歴・職務経歴</h1>
            <p class="center_text">新卒</p>

            <h1 class="title">誕生日・干支・星座</h1>
            <div class="flex-box">
                <div class="flex-item">
                    <h3 class="card_ttl">誕生日</h3>
                    <p class="card_ttl">birthday</p>
                    <img class="card_img" src="img/otter.png" alt="誕生日">
                    <p class="card_text">8月24日</p>
                </div>
                <div class="flex-item">
                    <h3 class="card_ttl">干支</h3>
                    <p class="card_ttl">zodiac</p>
                    <img class="card_img" src="img/sheep.png" alt="干支">
                    <p class="card_text">ひつじ</p>
                </div>
                <div class="flex-item">
                    <h3 class="card_ttl">星座</h3>
                    <p class="card_ttl">constellation</p>
                    <img class="card_img" src="img/otter.png" alt="星座">
                    <p class="card_text">おとめ座</p>
                </div>
            </div>
        </main>
    </body>
</html>
